<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Combustível" />
  <meta name="theme-color" content="#0f0f0f" />
  <title>Combustível</title>

  <!-- Uses SF Pro Rounded (nativa do iPhone) + fallbacks arredondados -->

  <style>
    /* ── Reset & Tokens ────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f0f;
      --surface:   #1a1a1a;
      --border:    #2a2a2a;
      --accent:    #e8f455;
      --accent-dk: #c8d93a;
      --text:      #f0f0f0;
      --muted:     #666;
      --error-bg:  #2a1515;
      --error:     #ff6b6b;
      --radius:    16px;
      --rounded:   'SF Pro Rounded', ui-rounded, 'Hiragino Maru Gothic ProN', 'Quicksand', 'Varela Round', sans-serif;
      --mono:      'SF Mono', ui-monospace, monospace;
      --safe-top:  env(safe-area-inset-top, 0px);
      --safe-bot:  env(safe-area-inset-bottom, 0px);
    }

    @media (prefers-color-scheme: light) {
      :root {
        --bg:       #f4f4ef;
        --surface:  #ffffff;
        --border:   #e0e0d8;
        --accent:   #1a1a1a;
        --accent-dk:#000;
        --text:     #111;
        --muted:    #888;
        --error-bg: #fff0f0;
        --error:    #c0392b;
      }
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--rounded);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Layout ────────────────────────────────────────── */
    .app {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding:
        calc(var(--safe-top) + 28px)
        20px
        calc(var(--safe-bot) + 32px);
      max-width: 430px;
      margin: 0 auto;
      gap: 20px;
    }

    /* ── Header ────────────────────────────────────────── */
    header {
      display: flex;
      flex-direction: column;
      gap: 4px;
      animation: slideDown .5s cubic-bezier(.22,1,.36,1) both;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: grid; place-items: center;
      font-size: 18px;
    }
    h1 {
      font-family: var(--rounded);
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -.3px;
    }
    .subtitle {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: .5px;
      text-transform: uppercase;
      padding-left: 46px;
    }

    /* ── Card ──────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      animation: fadeUp .5s cubic-bezier(.22,1,.36,1) .1s both;
    }

    /* ── Input rows ────────────────────────────────────── */
    .input-row {
      display: flex;
      align-items: center;
      padding: 14px 18px;
      gap: 12px;
      position: relative;
    }
    .input-row + .input-row::before {
      content: '';
      position: absolute;
      top: 0; left: 18px; right: 18px;
      height: 1px;
      background: var(--border);
    }
    .row-icon {
      font-size: 18px;
      width: 28px;
      text-align: center;
      flex-shrink: 0;
    }
    .row-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--muted);
    }
    input[type="text"] {
      background: transparent;
      border: none;
      outline: none;
      font-family: var(--rounded);
      font-size: 17px;
      font-weight: 500;
      color: var(--text);
      width: 100%;
      -webkit-appearance: none;
    }
    input[type="text"]::placeholder { color: var(--muted); }
    .row-unit {
      font-size: 12px;
      color: var(--muted);
      flex-shrink: 0;
    }

    /* ── Focus highlight ───────────────────────────────── */
    .input-row:focus-within {
      background: color-mix(in srgb, var(--accent) 6%, var(--surface));
    }
    .input-row:focus-within label { color: var(--accent); }

    /* ── Buttons ───────────────────────────────────────── */
    .actions {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 10px;
      animation: fadeUp .5s cubic-bezier(.22,1,.36,1) .2s both;
    }
    button {
      border: none;
      border-radius: 14px;
      font-family: var(--rounded);
      font-weight: 600;
      cursor: pointer;
      padding: 16px 12px;
      font-size: 15px;
      transition: transform .1s, opacity .1s;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { transform: scale(.97); opacity: .85; }

    .btn-clear {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .btn-calc {
      background: var(--accent);
      color: #0f0f0f;
      font-weight: 700;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    @media (prefers-color-scheme: light) {
      .btn-calc { color: #fff; background: #111; }
    }

    /* ── Error ─────────────────────────────────────────── */
    .error-box {
      background: var(--error-bg);
      border: 1px solid color-mix(in srgb, var(--error) 30%, transparent);
      border-radius: var(--radius);
      padding: 14px 18px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      color: var(--error);
      font-size: 13px;
      line-height: 1.5;
      animation: fadeUp .3s cubic-bezier(.22,1,.36,1) both;
    }
    .error-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

    /* ── Result ────────────────────────────────────────── */
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 20px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      position: relative;
      overflow: hidden;
      animation: popIn .45s cubic-bezier(.22,1,.36,1) both;
    }
    .result-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, color-mix(in srgb, var(--accent) 10%, transparent), transparent 70%);
      pointer-events: none;
    }
    .result-label {
      font-size: 10px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
    }
    .result-value {
      font-family: var(--rounded);
      font-size: clamp(40px, 14vw, 58px);
      font-weight: 800;
      color: var(--accent);
      letter-spacing: -1px;
      line-height: 1;
    }
    @media (prefers-color-scheme: light) {
      .result-value { color: #111; }
    }
    .result-detail {
      font-size: 12px;
      color: var(--muted);
      margin-top: 4px;
    }
    .result-breakdown {
      display: flex;
      gap: 20px;
      margin-top: 12px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      width: 100%;
      justify-content: center;
    }
    .breakdown-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .breakdown-val {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
    }
    .breakdown-lbl {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--muted);
    }

    /* ── Hidden ────────────────────────────────────────── */
    .hidden { display: none !important; }

    /* ── Animations ────────────────────────────────────── */
    @keyframes slideDown {
      from { opacity:0; transform:translateY(-16px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes popIn {
      0%   { opacity:0; transform:scale(.92); }
      60%  { transform:scale(1.02); }
      100% { opacity:1; transform:scale(1); }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">⛽</div>
      <h1>Combustível</h1>
    </div>
    <p class="subtitle">Calculadora de custo de viagem</p>
  </header>

  <!-- Inputs -->
  <div class="card">
    <div class="input-row">
      <span class="row-icon">📍</span>
      <div class="row-body">
        <label for="distance">Distância</label>
        <input id="distance" type="text" inputmode="decimal" placeholder="0" autocomplete="off" />
      </div>
      <span class="row-unit">km</span>
    </div>
    <div class="input-row">
      <span class="row-icon">🔧</span>
      <div class="row-body">
        <label for="consumption">Consumo</label>
        <input id="consumption" type="text" inputmode="decimal" placeholder="15" autocomplete="off" />
      </div>
      <span class="row-unit">km/L</span>
    </div>
    <div class="input-row">
      <span class="row-icon">💶</span>
      <div class="row-body">
        <label for="price">Preço do combustível</label>
        <input id="price" type="text" inputmode="decimal" placeholder="1,799" autocomplete="off" />
      </div>
      <span class="row-unit">€/L</span>
    </div>
  </div>

  <!-- Buttons -->
  <div class="actions">
    <button class="btn-clear" onclick="clearAll()">↺ Limpar</button>
    <button class="btn-calc" onclick="calculate()">⛽ Calcular</button>
  </div>

  <!-- Error -->
  <div id="error" class="error-box hidden">
    <span class="error-icon">⚠️</span>
    <span id="error-msg"></span>
  </div>

  <!-- Result -->
  <div id="result" class="result-card hidden">
    <span class="result-label">Custo estimado da viagem</span>
    <span id="result-value" class="result-value"></span>
    <span id="result-detail" class="result-detail"></span>
    <div class="result-breakdown">
      <div class="breakdown-item">
        <span id="bd-liters" class="breakdown-val">—</span>
        <span class="breakdown-lbl">Litros</span>
      </div>
      <div class="breakdown-item">
        <span id="bd-dist" class="breakdown-val">—</span>
        <span class="breakdown-lbl">Distância</span>
      </div>
      <div class="breakdown-item">
        <span id="bd-per100" class="breakdown-val">—</span>
        <span class="breakdown-lbl">€/100km</span>
      </div>
    </div>
  </div>

</div>

<script>
  const LS_CONSUMPTION = 'fc_consumption';
  const LS_PRICE       = 'fc_price';

  const $ = id => document.getElementById(id);

  // ── Load saved values ──────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    $('consumption').value = localStorage.getItem(LS_CONSUMPTION) || '15';
    $('price').value       = localStorage.getItem(LS_PRICE)       || '1,799';
    $('distance').focus();
  });

  // ── Allow Enter key to calculate ──────────────────────
  document.querySelectorAll('input').forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });
  });

  // ── Parse: accepts comma or dot ───────────────────────
  function parse(str) {
    const v = parseFloat(str.trim().replace(',', '.'));
    return isNaN(v) ? null : v;
  }

  function fmt(n, decimals = 2) {
    return n.toLocaleString('pt-BR', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
  }

  // ── Calculate ─────────────────────────────────────────
  function calculate() {
    hideError();
    hideResult();

    const dist = parse($('distance').value);
    const cons = parse($('consumption').value);
    const prc  = parse($('price').value);

    if (!dist || dist <= 0) return showError('Insira uma distância válida (maior que 0).');
    if (!cons || cons <= 0) return showError('Insira um consumo válido (maior que 0).');
    if (!prc  || prc  <= 0) return showError('Insira um preço válido (maior que 0).');

    const liters  = dist / cons;
    const cost    = liters * prc;
    const per100  = (100 / cons) * prc;

    // Save
    localStorage.setItem(LS_CONSUMPTION, $('consumption').value);
    localStorage.setItem(LS_PRICE,       $('price').value);

    // Show result
    $('result-value').textContent  = fmt(cost) + ' €';
    $('result-detail').textContent = `para ${fmt(dist, 0)} km com consumo de ${fmt(cons)} km/L`;
    $('bd-liters').textContent     = fmt(liters) + ' L';
    $('bd-dist').textContent       = fmt(dist, 0) + ' km';
    $('bd-per100').textContent     = fmt(per100) + ' €';

    // Re-trigger animation
    const el = $('result');
    el.classList.remove('hidden');
    el.style.animation = 'none';
    el.offsetHeight; // reflow
    el.style.animation = '';

    // Blur keyboard
    document.activeElement?.blur();
  }

  // ── Clear ─────────────────────────────────────────────
  function clearAll() {
    $('distance').value    = '';
    $('consumption').value = localStorage.getItem(LS_CONSUMPTION) || '15';
    $('price').value       = localStorage.getItem(LS_PRICE)       || '1,799';
    hideError();
    hideResult();
    $('distance').focus();
  }

  function showError(msg) {
    $('error-msg').textContent = msg;
    $('error').classList.remove('hidden');
  }
  function hideError()  { $('error').classList.add('hidden'); }
  function hideResult() { $('result').classList.add('hidden'); }
</script>
</body>
</html>
